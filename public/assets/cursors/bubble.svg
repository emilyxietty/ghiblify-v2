<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <defs>
    <radialGradient id="bub-body" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="55%" stop-color="#bfe2ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7ab5e0" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="bub-shine" cx="0.32" cy="0.3" r="0.3">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Translucent soap-bubble body with thin rim. -->
  <circle cx="12" cy="12" r="9.5" fill="url(#bub-body)"
          stroke="#9ec9eb" stroke-width="0.6" stroke-opacity="0.7"/>
  <!-- Glossy upper-left highlight. -->
  <ellipse cx="9" cy="8.5" rx="3.5" ry="2.3" fill="url(#bub-shine)"/>
  <!-- Tiny pinpoint sheen for that bubble glint. -->
  <circle cx="8.4" cy="7.8" r="0.7" fill="#ffffff" fill-opacity="0.95"/>
</svg>
