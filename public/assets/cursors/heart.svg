<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <defs>
    <radialGradient id="ht-body" cx="0.45" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#ff9bb6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e25478" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="ht-shine" cx="0.3" cy="0.3" r="0.3">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Round, plump cartoon heart — two top lobes meeting at a soft
       dip, tapering to a rounded point. -->
  <path d="M 12 21
           C 12 21 3.5 14.6 3.5 9.2
           C 3.5 6.4 5.7 4.4 8.3 4.4
           C 10 4.4 11.3 5.3 12 6.6
           C 12.7 5.3 14 4.4 15.7 4.4
           C 18.3 4.4 20.5 6.4 20.5 9.2
           C 20.5 14.6 12 21 12 21 Z"
        fill="url(#ht-body)"
        stroke="#c63962" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Glossy upper-left highlight. -->
  <ellipse cx="8.5" cy="8" rx="2.4" ry="1.5" fill="url(#ht-shine)"/>
</svg>
